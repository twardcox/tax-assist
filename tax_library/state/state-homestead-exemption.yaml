id: state-homestead-exemption
name: State Homestead Property Tax Exemption
category: real_estate
jurisdiction: state

authority:
  irc_section: null
  irs_publication: null
  state_source: "State property tax codes — available in virtually every state; details vary widely by state and county"

status: active

benefit_type: exemption

summary: |
  Nearly every state offers a homestead exemption that reduces the assessed value of a
  primary residence for property tax purposes. The exemption can be a flat dollar amount
  ($25,000 – $100,000 removed from assessed value) or a percentage reduction. Many
  homeowners fail to apply, leaving hundreds or thousands of dollars per year on the table.
  Additional enhanced exemptions are available for seniors, veterans, and disabled taxpayers
  in most states.

estimated_value:
  typical_range: "$200 – $2,000+/year"
  calculation_basis: "Local property tax rate × exemption amount"
  depends_on:
    - household.residence.state
    - real_estate.properties (primary residence ownership)"

eligibility_rules:
  - rule: "Must own and occupy a primary residence as of January 1 of the tax year in most states"
    required_fact: "real_estate.properties (primary_residence type)"
  - rule: "Must apply with the county property appraiser or assessor — exemption is not automatic"
    required_fact: "homestead_applied flag"

required_user_facts:
  - fact: "household.residence.state"
  - fact: "real_estate.properties (primary_residence present)"

required_documents:
  - document: "Proof of ownership (deed or mortgage statement)"
  - document: "Government-issued ID showing primary residence address"
  - document: "Application filed with county property appraiser/assessor"

required_forms:
  - form: "County homestead exemption application (varies by county)"

deadlines:
  - deadline: "Most states: application due by March 1 of the tax year (FL, TX, GA)"
  - deadline: "CA: no recurring application required after initial filing"
  - deadline: "Must own and occupy the property as of January 1 in most states"

phaseouts: []

stacking_rules:
  compatible_with:
    - mortgage-interest-deduction
    - salt-deduction
    - real-estate-depreciation
  conflicts_with:
    - none

risk_level: low

risk_notes: |
  Zero risk — this is a government-administered property tax reduction. The only risk is
  failing to apply by the deadline, which means waiting until the next year.

planning_notes: |
  - Apply immediately if you recently purchased a home — do not wait for the county to remind you
  - If a senior (65+) or veteran, check for enhanced exemptions that can double or triple the savings
  - Some states (TX, FL) also have a homestead cap that limits the annual assessment increase — very valuable in appreciating markets
  - "Portability" in FL allows transferring accumulated assessment savings to a new home

qualification_pathways:
  - "Recently purchased primary residence: apply with county appraiser before March 1 deadline"

review_required:
  cpa: false
  attorney: false

last_verified: 2025-01-01
next_review: 2026-01-01
