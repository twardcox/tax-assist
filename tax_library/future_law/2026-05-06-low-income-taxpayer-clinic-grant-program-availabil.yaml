raw_abstract: This document contains a notice that the IRS has provided a grant opportunity
  in www.grants.gov for organizations interested in applying for a Low Income Taxpayer
  Clinic (LITC) matching grant. The IRS is authorized to award multi-year LITC grants
  not to exceed three years. Grants may be awarded for the development/start up, expansion,
  or continuation of programs providing qualified services to eligible taxpayers.
  The budget period for the grant will be January 1, 2027- December 31, 2027. For
  new grantees, the Period of Performance is generally one year (January 1, 2027-December
  31, 2027.) The application period runs from May 6, 2026, through July 6, 2026.
