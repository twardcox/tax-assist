raw_abstract: This document contains proposed regulations that would update certain
  arbitrage rules and definitions applicable to tax-exempt and other tax-advantaged
  bonds by clarifying the time and manner for requesting refunds of overpayment of
  rebate to the United States, the special transition rule for transferred proceeds,
  the limitation on allocations to expenditures, and the IRS address for filing defeasance
  notices. These proposed regulations would also revise the provision addressing certain
  perpetual State guarantee funds, the definition of tax-exempt bond, and the definition
  of refunding issue. The proposed regulations would affect issuers of tax-advantaged
  bonds.
