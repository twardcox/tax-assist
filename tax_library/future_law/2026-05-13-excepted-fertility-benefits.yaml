raw_abstract: This document contains proposed rules that would amend the regulations
  regarding excepted benefits under the Employee Retirement Income Security Act of
  1974, the Internal Revenue Code, and the Public Health Service Act to establish
  certain fertility benefits as a new category of limited excepted benefits. Excepted
  benefits are generally exempt from the market requirements that were added to those
  laws by the Health Insurance Portability and Accountability Act, the Patient Protection
  and Affordable Care Act, the No Surprises Act, and certain other Federal laws specifically
  related to group health plans and group and individual health insurance coverage.
