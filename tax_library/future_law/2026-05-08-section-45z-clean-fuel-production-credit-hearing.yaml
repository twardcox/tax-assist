summary: This document announces that the public hearing scheduled for Wednesday,
  May 27, 2026, Thursday, May 28, 2026, and Friday, May 29, 2026, for the notice of
  proposed rulemaking (REG-121244-23) published in the Federal Register on Wednesday,
  February 4, 2026, has been changed to a telephonic-only hearing. These proposed
  regulations would provide rules for determining clean fuel production credits, including
  credit eligibility rules, emissions rates, and certification and registration requirements.
