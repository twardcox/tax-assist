summary: This document contains proposed regulations amending the current regulations
  to increase the amount of the user fee imposed on authorized persons requesting
  the issuance of an estate tax closing letter. The Independent Offices Appropriations
  Act of 1952 authorizes charging user fees in appropriate circumstances. The proposed
  regulations would affect persons who request an estate tax closing letter.
