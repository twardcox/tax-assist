raw_abstract: "9. How long will Treasury operate the SSBCI TA Grant Program and SBOP?\
  \ [05/11/2026]\nTiffany.Hyatt@…\nMon, 05/11/2026 - 11:50\n\n\n  \n    FAQ Question\n\
  \              9. How long will Treasury operate the SSBCI TA Grant Program and\
  \ SBOP? [05/11/2026]\n          \n\n            Treasury will continue to operate\
  \ the SSBCI TA Grant Program and Small Business Opportunity Program (SBOP) through\
  \ the end of the contractual period of performance for all grant recipients and\
  \ the completion of appropriate close-out activities and any other duties in accordance\
  \ with the SSBCI TA Grant Agreements and 2 CFR Part 200. However, Congress has provided\
  \ that all undisbursed SSBCI funding is rescinded on September 30, 2030. See Pub.\
  \ L. 117–2, section 3301(a)(2)(B). While Treasury will make reasonable efforts to\
  \ process all pending disbursement requests prior to September 30, 2030, disbursement\
  \ requests submitted after June 30, 2030, are not expected to be processed.&nbsp;Under\
  \ Treasury’s SSBCI TA Grant Program and SBOP terms and conditions, all modifications\
  \ to an SSBCI TA grant’s period of performance require prior approval by Treasury\
  \ in accordance with 2 CFR 200.308. Treasury expects to deny any requests for extension\
  \ that would increase the period of performance beyond the standard five-year cap\
  \ for the TA Grant Program and the three-year cap for SBOP awards. Treasury may\
  \ approve limited extensions, in its discretion, so long as they do not cause the\
  \ period of performance to exceed five years for TA and three years for SBOP, or\
  \ go beyond September 30, 2029, whichever is earlier. For grant modifications approved\
  \ after the date of this FAQ, Treasury will not make additional disbursements of\
  \ SSBCI funding (e.g., second or third tranches) to the recipient during any approved\
  \ extension period.This FAQ does not limit any authorities that may continue to\
  \ exist under applicable law, such as laws related to collection of debts or investigation\
  \ of waste, fraud, and abuse and any associated remedies available to Treasury,\
  \ federal or state auditors, or investigatory bodies.&nbsp;"
