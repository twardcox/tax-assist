affected_benefits: []
summary: This document contains final regulations providing that amounts paid to a
  member of an Indian Tribe as remuneration for services performed in a fishing rights-related
  activity may be treated as compensation for purposes of applying the limits on qualified
  retirement plan benefits and contributions. These regulations affect participants,
  beneficiaries, sponsors, and administrators of Tribal plans.
