id: county-disability-property-tax-exemption
name: County Disability Property Tax Exemption
category: real_estate
jurisdiction: county

authority:
  irc_section: null
  irs_publication: null
  state_source: "State disability property tax statutes administered at the county level — available in most states; amount and definition of disability vary"

status: active

benefit_type: exemption

summary: |
  Most counties offer a property tax exemption or circuit breaker credit for homeowners who
  are permanently and totally disabled. The exemption ranges from a partial reduction in
  assessed value to a full property tax freeze or exemption in states with strong programs.
  Qualifying disabilities typically require SSA or physician certification. This benefit is
  frequently overlooked because disabled taxpayers assume their existing SSA benefits cover
  it, or they are unaware of the application requirement.

estimated_value:
  typical_range: "$200 – Full property tax exemption ($3,000–$10,000+/year)"
  calculation_basis: "County millage rate × exemption amount; some states freeze assessment entirely"
  depends_on:
    - household.taxpayer.disabled
    - household.residence.state
    - household.residence.county
    - real_estate.properties (primary_residence)
    - household.estimated_agi (income limits apply in some states)

eligibility_rules:
  - rule: "Must be permanently and totally disabled per SSA determination or licensed physician"
    required_fact: "household.taxpayer.disabled"
  - rule: "Must own and occupy the property as a primary residence"
    required_fact: "real_estate.properties (primary_residence type)"
  - rule: "Some counties impose income limits (typically $30,000–$75,000 household income)"
    required_fact: "household.estimated_agi"
  - rule: "Must apply with the county assessor — not automatic"
    required_fact: "household.residence.county"

required_user_facts:
  - fact: "household.taxpayer.disabled (true)"
  - fact: "household.residence.state"
  - fact: "household.residence.county"
  - fact: "real_estate.properties (primary_residence present)"

required_documents:
  - document: "SSA disability award letter or physician certification of permanent total disability"
  - document: "Deed or property tax bill showing ownership"
  - document: "County disability exemption application"

required_forms:
  - form: "County disability property tax exemption application (varies — search '[county] disability property tax exemption')"

deadlines:
  - deadline: "Most states: March 1 – April 1 of the tax year"
  - deadline: "IL: July 1"
  - deadline: "TX: April 30"
  - deadline: "Check with county assessor — some allow retroactive claims back 1–2 years"

phaseouts:
  - threshold: "Income limits vary by county ($30,000–$75,000 in most programs)"
    effect: "Ineligible above income threshold; reduced benefit in some circuit-breaker programs"

stacking_rules:
  compatible_with:
    - county-homestead-exemption
    - state-homestead-exemption
    - county-senior-property-tax-freeze
    - county-veteran-property-tax-exemption
  conflicts_with:
    - none

risk_level: low

risk_notes: |
  No tax risk — government-administered exemption for qualifying disabled homeowners.
  Disability must be legitimate and documentable; providing false certifications is fraud.

planning_notes: |
  - If you are on SSA disability, your award letter is typically sufficient documentation
  - Some counties allow a doctor's letter in lieu of SSA determination
  - In many states the disability exemption stacks with the homestead and senior exemptions
  - IL: Senior Citizens Assessment Freeze also available if 65+ and disabled
  - TX: Disability homestead exemption reduces school district taxes by at least $10,000
  - If recently disabled, check if the county allows retroactive claims — some allow 1–2 years

qualification_pathways:
  - "Disabled (SSA or physician certified), owns primary residence: apply at county assessor"

review_required:
  cpa: false
  attorney: false

last_verified: 2025-01-01
next_review: 2026-01-01
